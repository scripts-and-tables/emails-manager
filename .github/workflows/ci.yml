name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      # Test-only secrets. Never reuse these in any deployed environment.
      SECRET_KEY: "ci-test-only-not-used-anywhere-real"
      DEBUG: "True"
      ALLOWED_HOSTS: "*"
      FIELD_ENCRYPTION_KEY: "Hv7g3qJZkXyN9vL8fRwTpBmCoUaSdEeFiKlOQrUvWxY="
      RESEND_API_KEY: "test-key-mocked-in-tests"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pip-audit

      - name: Lint with ruff
        run: ruff check .

      - name: Audit dependencies for known vulnerabilities
        run: pip-audit -r requirements.txt --strict

      - name: Run Django tests
        run: python manage.py test --verbosity=2
