<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Something went wrong · Mail.Ru Manager</title>
  <style>
    body {
      margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: #f7f8fa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #212529;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #16181b; color: #dee2e6; }
      .err-card { background: #1f2225; border-color: rgba(255,255,255,.08) !important; }
      .err-sub { color: #adb5bd !important; }
    }
    .err-wrap { width: 100%; max-width: 420px; padding: 1.5rem; }
    .err-card {
      background: #fff; border: 1px solid rgba(0,0,0,.06);
      border-radius: .8rem; padding: 2.5rem 1.75rem; text-align: center;
      box-shadow: 0 4px 16px rgba(0,0,0,.04);
    }
    .err-mark {
      display: inline-flex; align-items: center; justify-content: center;
      width: 56px; height: 56px; border-radius: 14px;
      background: linear-gradient(135deg, #dc3545 0%, #ff6b6b 100%);
      color: #fff; font-size: 30px;
      box-shadow: 0 4px 12px rgba(220, 53, 69, .25);
      margin-bottom: 1.25rem;
    }
    .err-code { font-size: .8rem; font-weight: 600; letter-spacing: .15em; text-transform: uppercase; color: #6c757d; margin-bottom: .5rem; }
    .err-title { font-size: 1.5rem; font-weight: 700; margin: 0 0 .5rem; }
    .err-sub { color: #6c757d; margin: 0 0 1.5rem; line-height: 1.5; }
    .err-btn {
      display: inline-block;
      padding: .7rem 1.5rem;
      background: linear-gradient(135deg, #005FF9 0%, #0099FF 100%);
      color: #fff; text-decoration: none; font-weight: 500;
      border-radius: 10px;
      box-shadow: 0 4px 14px rgba(0, 95, 249, .25);
    }
    .err-btn:hover { box-shadow: 0 6px 18px rgba(0, 95, 249, .35); }
  </style>
</head>
<body>
  <div class="err-wrap">
    <div class="err-card">
      <span class="err-mark">!</span>
      <div class="err-code">500</div>
      <h1 class="err-title">Something went wrong</h1>
      <p class="err-sub">An unexpected error occurred on our side. Please try again in a moment.</p>
      <a class="err-btn" href="/">Back to home</a>
    </div>
  </div>
</body>
</html>
