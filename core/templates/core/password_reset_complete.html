{% extends "core/base.html" %}
{% block title %}Password updated · Emails Manager{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card card-soft">
      <div class="card-body p-4 text-center">
        <h1 class="h4 mb-3">Password updated</h1>
        <p class="text-secondary small mb-4">
          Your password has been changed. You can now sign in with the new password.
        </p>
        <a class="btn btn-primary w-100" href="{% url 'core:login' %}">Go to sign in</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
