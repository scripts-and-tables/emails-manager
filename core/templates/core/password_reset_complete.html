{% extends "core/base.html" %}
{% block title %}Password updated · Emails Manager{% endblock %}
{% block content %}
<div class="auth-card-wrap py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-10 col-md-7 col-lg-5" style="max-width: 420px;">
      <div class="card card-soft shadow-sm">
        <div class="card-body p-4 p-md-5 text-center">
          <div class="mb-4">
            <span class="brand-mark brand-mark-lg" aria-hidden="true" style="background: linear-gradient(135deg, #198754 0%, #20c997 100%);">
              <i class="bi bi-check-lg" style="font-size: 32px;"></i>
            </span>
          </div>
          <h1 class="h3 mb-2">Password updated</h1>
          <p class="text-secondary mb-4">
            Your password has been changed. You can now sign in with the new password.
          </p>
          <a class="btn btn-primary w-100 py-2" href="{% url 'core:login' %}">
            Go to sign in <i class="bi bi-arrow-right ms-1"></i>
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
