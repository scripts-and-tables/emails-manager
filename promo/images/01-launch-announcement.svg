<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" preserveAspectRatio="xMidYMid meet"
     role="img" aria-label="Mails Manager App — now live">
  <title>Mails Manager App — now live</title>

  <defs>
    <linearGradient id="g1-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#005FF9"/>
      <stop offset="100%" stop-color="#0099FF"/>
    </linearGradient>
    <linearGradient id="g1-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbfcfd"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <radialGradient id="g1-glow" cx="80%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#005FF9" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#005FF9" stop-opacity="0"/>
    </radialGradient>
    <pattern id="g1-dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#005FF9" fill-opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="1200" height="1200" fill="url(#g1-bg)"/>
  <rect width="1200" height="1200" fill="url(#g1-dots)"/>
  <rect width="1200" height="1200" fill="url(#g1-glow)"/>

  <!-- NOW LIVE pill -->
  <g transform="translate(120, 140)">
    <rect x="0" y="0" width="186" height="44" rx="22" fill="#ffffff" stroke="#dee2e6"/>
    <circle cx="22" cy="22" r="6" fill="#198754"/>
    <circle cx="22" cy="22" r="11" fill="#198754" fill-opacity="0.18"/>
    <text x="42" y="29"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="15" font-weight="600" fill="#1a1d20" letter-spacing="0.18em">N O W &#160; L I V E</text>
  </g>

  <!-- Logo lockup -->
  <g transform="translate(120, 230)">
    <rect x="0" y="0" width="120" height="120" rx="26" fill="url(#g1-grad)"/>
    <text x="60" y="92" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="76" font-weight="700" fill="#ffffff">@</text>

    <text x="148" y="68"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="60" font-weight="700" fill="#1a1d20" letter-spacing="-0.01em">Mails Manager</text>
    <text x="148" y="108"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="22" font-weight="500" fill="#6c757d" letter-spacing="0.22em">A&#160;P&#160;P</text>
  </g>

  <!-- Headline -->
  <text x="120" y="500"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="92" font-weight="800" fill="#1a1d20" letter-spacing="-0.02em">One dashboard</text>
  <text x="120" y="600"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="92" font-weight="800" letter-spacing="-0.02em" fill="url(#g1-grad)">for every mailbox.</text>

  <!-- Subhead -->
  <text x="120" y="680"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="30" font-weight="500" fill="#495057">Multi-account IMAP, encrypted credentials, OTP 2FA.</text>

  <!-- Feature pills -->
  <g transform="translate(120, 740)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" fill="#1a1d20">
    <g>
      <rect x="0" y="0" width="270" height="48" rx="24" fill="#ffffff" stroke="#dee2e6"/>
      <circle cx="24" cy="24" r="6" fill="#005FF9"/>
      <text x="42" y="32" font-weight="500">Encrypted credentials</text>
    </g>
    <g transform="translate(286, 0)">
      <rect x="0" y="0" width="222" height="48" rx="24" fill="#ffffff" stroke="#dee2e6"/>
      <circle cx="24" cy="24" r="6" fill="#198754"/>
      <text x="42" y="32" font-weight="500">Email-OTP 2FA</text>
    </g>
    <g transform="translate(524, 0)">
      <rect x="0" y="0" width="178" height="48" rx="24" fill="#ffffff" stroke="#dee2e6"/>
      <circle cx="24" cy="24" r="6" fill="#6f42c1"/>
      <text x="42" y="32" font-weight="500">Live IMAP</text>
    </g>
    <g transform="translate(0, 64)">
      <rect x="0" y="0" width="200" height="48" rx="24" fill="#ffffff" stroke="#dee2e6"/>
      <circle cx="24" cy="24" r="6" fill="#d63384"/>
      <text x="42" y="32" font-weight="500">Open source</text>
    </g>
    <g transform="translate(216, 64)">
      <rect x="0" y="0" width="252" height="48" rx="24" fill="#ffffff" stroke="#dee2e6"/>
      <circle cx="24" cy="24" r="6" fill="#fd7e14"/>
      <text x="42" y="32" font-weight="500">Deployed on Railway</text>
    </g>
  </g>

  <!-- URL bar -->
  <g transform="translate(120, 980)">
    <rect x="0" y="0" width="960" height="100" rx="22" fill="#0f1726"/>
    <circle cx="40" cy="50" r="8" fill="#dc3545"/>
    <circle cx="68" cy="50" r="8" fill="#ffc107"/>
    <circle cx="96" cy="50" r="8" fill="#198754"/>
    <rect x="140" y="22" width="780" height="56" rx="14" fill="#1c2740"/>
    <text x="166" y="58"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="26" font-weight="600" fill="#9bb3ff">https://</text>
    <text x="266" y="58"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="26" font-weight="700" fill="#ffffff">m-m.up.railway.app</text>
  </g>

  <!-- Decorative envelope, top-right corner -->
  <g transform="translate(880, 220)" opacity="0.9">
    <g transform="rotate(-9 140 110)" opacity="0.30">
      <rect x="20" y="40" width="200" height="130" rx="12" fill="url(#g1-grad)"/>
      <path d="M 20 52 L 120 120 L 220 52" stroke="#ffffff" stroke-width="3" fill="none" stroke-linejoin="round"/>
    </g>
    <g transform="rotate(-1 150 120)" opacity="0.60">
      <rect x="30" y="50" width="200" height="130" rx="12" fill="url(#g1-grad)"/>
      <path d="M 30 62 L 130 130 L 230 62" stroke="#ffffff" stroke-width="3" fill="none" stroke-linejoin="round"/>
    </g>
    <g transform="rotate(8 160 130)">
      <rect x="40" y="60" width="200" height="130" rx="12" fill="url(#g1-grad)"/>
      <path d="M 40 72 L 140 140 L 240 72" stroke="#ffffff" stroke-width="3" fill="none" stroke-linejoin="round"/>
      <line x1="62" y1="160" x2="180" y2="160" stroke="#ffffff" stroke-width="2" opacity="0.55"/>
      <line x1="62" y1="176" x2="150" y2="176" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
    </g>
  </g>
</svg>
