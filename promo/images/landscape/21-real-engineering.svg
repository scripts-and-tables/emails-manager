<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid meet"
     role="img" aria-label="Side projects deserve real engineering">
  <title>Side projects deserve real engineering</title>

  <defs>
    <linearGradient id="g21-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#005FF9"/>
      <stop offset="100%" stop-color="#0099FF"/>
    </linearGradient>
    <linearGradient id="g21-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbfcfd"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <pattern id="g21-dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#005FF9" fill-opacity="0.06"/>
    </pattern>
    <radialGradient id="g21-glow" cx="100%" cy="0%" r="65%">
      <stop offset="0%" stop-color="#005FF9" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#005FF9" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#g21-bg)"/>
  <rect width="1200" height="630" fill="url(#g21-dots)"/>
  <rect width="1200" height="630" fill="url(#g21-glow)"/>

  <!-- Eyebrow -->
  <g transform="translate(72, 72)">
    <rect x="0" y="0" width="170" height="38" rx="19" fill="#ffffff" stroke="#dee2e6"/>
    <circle cx="20" cy="19" r="5" fill="#005FF9"/>
    <text x="36" y="25"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="13" font-weight="600" fill="#1a1d20" letter-spacing="0.18em">O P I N I O N</text>
  </g>

  <!-- Headline (left ~60%) -->
  <text x="72" y="220"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="64" font-weight="800" fill="#1a1d20" letter-spacing="-0.02em">Side projects</text>
  <text x="72" y="290"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="64" font-weight="800" fill="#1a1d20" letter-spacing="-0.02em">deserve real</text>
  <text x="72" y="360"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="64" font-weight="800" letter-spacing="-0.02em" fill="url(#g21-grad)">engineering.</text>

  <text x="72" y="412"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="20" font-weight="500" fill="#495057">No users yet — but built like there are a thousand.</text>

  <!-- Footer -->
  <g transform="translate(72, 540)">
    <rect x="0" y="0" width="40" height="40" rx="9" fill="url(#g21-grad)"/>
    <text x="20" y="30" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="24" font-weight="700" fill="#ffffff">@</text>
    <text x="52" y="20"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="16" font-weight="700" fill="#1a1d20">Mails Manager App</text>
    <text x="52" y="38"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="13" font-weight="500" fill="#6c757d">m-m.up.railway.app</text>
  </g>

  <!-- Right column: production checklist card -->
  <g transform="translate(740, 110)">
    <rect x="0" y="0" width="400" height="410" rx="22" fill="#ffffff" stroke="#dee2e6" stroke-width="2"/>
    <text x="28" y="44"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="13" font-weight="700" fill="#6c757d" letter-spacing="0.18em">P R O D - S H A P E D</text>

    <g transform="translate(28, 76)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
      <g>
        <circle cx="14" cy="14" r="14" fill="#198754" fill-opacity="0.18"/>
        <path d="M 7 14 L 12 19 L 21 9" stroke="#198754" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="40" y="20" font-size="18" font-weight="700" fill="#1a1d20">Email-OTP 2FA</text>
      </g>
      <g transform="translate(0, 50)">
        <circle cx="14" cy="14" r="14" fill="#198754" fill-opacity="0.18"/>
        <path d="M 7 14 L 12 19 L 21 9" stroke="#198754" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="40" y="20" font-size="18" font-weight="700" fill="#1a1d20">Fernet at rest</text>
      </g>
      <g transform="translate(0, 100)">
        <circle cx="14" cy="14" r="14" fill="#198754" fill-opacity="0.18"/>
        <path d="M 7 14 L 12 19 L 21 9" stroke="#198754" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="40" y="20" font-size="18" font-weight="700" fill="#1a1d20">CSP nonces · HSTS</text>
      </g>
      <g transform="translate(0, 150)">
        <circle cx="14" cy="14" r="14" fill="#198754" fill-opacity="0.18"/>
        <path d="M 7 14 L 12 19 L 21 9" stroke="#198754" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="40" y="20" font-size="18" font-weight="700" fill="#1a1d20">30 tests · auth + crypto</text>
      </g>
      <g transform="translate(0, 200)">
        <circle cx="14" cy="14" r="14" fill="#198754" fill-opacity="0.18"/>
        <path d="M 7 14 L 12 19 L 21 9" stroke="#198754" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="40" y="20" font-size="18" font-weight="700" fill="#1a1d20">AuthEvent audit log</text>
      </g>
      <g transform="translate(0, 250)">
        <circle cx="14" cy="14" r="14" fill="#198754" fill-opacity="0.18"/>
        <path d="M 7 14 L 12 19 L 21 9" stroke="#198754" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="40" y="20" font-size="18" font-weight="700" fill="#1a1d20">Live on Railway · 50s</text>
      </g>
    </g>
  </g>
</svg>
