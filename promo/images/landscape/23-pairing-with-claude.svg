<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid meet"
     role="img" aria-label="What pairing with Claude on a real Django app looks like">
  <title>What pairing with Claude on a real Django app looks like</title>

  <defs>
    <linearGradient id="g23-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#005FF9"/>
      <stop offset="100%" stop-color="#0099FF"/>
    </linearGradient>
    <linearGradient id="g23-anth" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cc785c"/>
      <stop offset="100%" stop-color="#d97757"/>
    </linearGradient>
    <linearGradient id="g23-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <pattern id="g23-dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#0099FF" fill-opacity="0.12"/>
    </pattern>
    <radialGradient id="g23-glow" cx="100%" cy="100%" r="65%">
      <stop offset="0%" stop-color="#cc785c" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#cc785c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#g23-bg)"/>
  <rect width="1200" height="630" fill="url(#g23-dots)"/>
  <rect width="1200" height="630" fill="url(#g23-glow)"/>

  <!-- Eyebrow -->
  <g transform="translate(72, 72)">
    <rect x="0" y="0" width="190" height="38" rx="19" fill="#0d1117" stroke="#30363d"/>
    <circle cx="20" cy="19" r="5" fill="#cc785c"/>
    <text x="36" y="25"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="13" font-weight="600" fill="#f0f6fc" letter-spacing="0.18em">A I &#160;P A I R I N G</text>
  </g>

  <!-- Headline -->
  <text x="72" y="220"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="56" font-weight="800" fill="#f0f6fc" letter-spacing="-0.02em">What pairing with</text>
  <text x="72" y="284"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="56" font-weight="800" letter-spacing="-0.02em" fill="url(#g23-anth)">Claude</text>
  <text x="220" y="284"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="56" font-weight="800" fill="#f0f6fc" letter-spacing="-0.02em">on a real</text>
  <text x="72" y="348"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="56" font-weight="800" fill="#f0f6fc" letter-spacing="-0.02em">Django app looks like.</text>

  <text x="72" y="404"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="20" font-weight="500" fill="#9ba9bb">Not vibes. Real diffs, security review, 30 tests.</text>

  <!-- Footer -->
  <g transform="translate(72, 540)">
    <rect x="0" y="0" width="40" height="40" rx="9" fill="url(#g23-grad)"/>
    <text x="20" y="30" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="24" font-weight="700" fill="#ffffff">@</text>
    <text x="52" y="20"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="16" font-weight="700" fill="#f0f6fc">Mails Manager App</text>
    <text x="52" y="38"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="13" font-weight="500" fill="#9ba9bb">paired with Claude · m-m.up.railway.app</text>
  </g>

  <!-- Right transcript card -->
  <g transform="translate(720, 110)">
    <rect x="0" y="0" width="420" height="410" rx="20" fill="#010409" stroke="#30363d" stroke-width="2"/>
    <rect x="0" y="0" width="420" height="38" rx="20" fill="#0d1117"/>
    <rect x="0" y="20" width="420" height="18" fill="#0d1117"/>
    <circle cx="22" cy="19" r="6" fill="#f85149"/>
    <circle cx="42" cy="19" r="6" fill="#d29922"/>
    <circle cx="62" cy="19" r="6" fill="#3fb950"/>
    <text x="210" y="25" text-anchor="middle"
          font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
          font-size="12" font-weight="600" fill="#7d8590">claude — mails-manager</text>

    <g transform="translate(20, 70)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
      <g>
        <circle cx="0" cy="-3" r="6" fill="url(#g23-anth)"/>
        <text x="14" y="2" font-weight="500" fill="#c9d1d9">add 2FA on every login, audit-logged</text>
      </g>
      <g transform="translate(0, 28)">
        <text x="14" y="2" fill="#7d8590">  reading auth/, models, settings…</text>
      </g>
      <g transform="translate(0, 56)">
        <text x="14" y="2" fill="#3fb950">✓ wired django-otp · OTP via Resend</text>
      </g>
      <g transform="translate(0, 84)">
        <text x="14" y="2" fill="#3fb950">✓ AuthEvent model · 5 tests pass</text>
      </g>
      <g transform="translate(0, 124)">
        <circle cx="0" cy="-3" r="6" fill="url(#g23-anth)"/>
        <text x="14" y="2" font-weight="500" fill="#c9d1d9">review for OWASP top-10</text>
      </g>
      <g transform="translate(0, 152)">
        <text x="14" y="2" fill="#7d8590">  scanning HSTS · CSP · cookies…</text>
      </g>
      <g transform="translate(0, 180)">
        <text x="14" y="2" fill="#3fb950">✓ added CSP nonces · all green</text>
      </g>
      <g transform="translate(0, 220)">
        <circle cx="0" cy="-3" r="6" fill="url(#g23-anth)"/>
        <text x="14" y="2" font-weight="500" fill="#c9d1d9">deploy to Railway</text>
      </g>
      <g transform="translate(0, 250)">
        <text x="14" y="2" font-weight="700" fill="#79c0ff">→ live in 50s · m-m.up.railway.app</text>
      </g>

      <!-- Stat row -->
      <g transform="translate(0, 290)">
        <rect x="0" y="0" width="380" height="42" rx="10" fill="#161b22" stroke="#30363d"/>
        <text x="14" y="27" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
              font-size="13" font-weight="700" fill="#f0f6fc">12 commits · 30 tests · 0 regressions</text>
      </g>
    </g>
  </g>
</svg>
