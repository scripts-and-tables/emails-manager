<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" preserveAspectRatio="xMidYMid meet"
     role="img" aria-label="Mails Manager App — open source on GitHub">
  <title>Mails Manager App — open source on GitHub</title>

  <defs>
    <linearGradient id="g8-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#005FF9"/>
      <stop offset="100%" stop-color="#0099FF"/>
    </linearGradient>
    <linearGradient id="g8-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbfcfd"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <pattern id="g8-dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#005FF9" fill-opacity="0.06"/>
    </pattern>
    <radialGradient id="g8-glow" cx="50%" cy="-10%" r="60%">
      <stop offset="0%" stop-color="#d63384" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#d63384" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="1200" fill="url(#g8-bg)"/>
  <rect width="1200" height="1200" fill="url(#g8-dots)"/>
  <rect width="1200" height="1200" fill="url(#g8-glow)"/>

  <!-- Eyebrow -->
  <g transform="translate(120, 140)">
    <rect x="0" y="0" width="200" height="44" rx="22" fill="#ffffff" stroke="#dee2e6"/>
    <circle cx="22" cy="22" r="6" fill="#d63384"/>
    <text x="42" y="29"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="15" font-weight="600" fill="#1a1d20" letter-spacing="0.18em">O P E N &#160;S O U R C E</text>
  </g>

  <text x="120" y="270"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="92" font-weight="800" fill="#1a1d20" letter-spacing="-0.02em">Read the code.</text>
  <text x="120" y="370"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="92" font-weight="800" letter-spacing="-0.02em" fill="url(#g8-grad)">Fork it. Ship it.</text>

  <text x="120" y="440"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="28" font-weight="500" fill="#495057">Every line — auth, IMAP, encryption — is on GitHub.</text>

  <!-- GitHub repo card -->
  <g transform="translate(120, 540)">
    <rect x="0" y="0" width="960" height="380" rx="28" fill="#0d1117" stroke="#30363d" stroke-width="2"/>

    <!-- GitHub mark -->
    <g transform="translate(50, 50)">
      <circle cx="60" cy="60" r="60" fill="#161b22"/>
      <!-- Cat silhouette: approximation with a rounded path -->
      <path d="M 60 22
               c -21 0 -38 17 -38 38
               c 0 17 11 31 26 36
               c 2 0 3 -1 3 -2
               l 0 -7
               c -10 2 -13 -4 -14 -5
               c -1 -2 -3 -3 -5 -4
               c -3 -2 0 -2 0 -2
               c 3 0 5 3 5 3
               c 3 5 8 4 10 3
               c 0 -2 1 -4 2 -5
               c -8 -1 -16 -4 -16 -18
               c 0 -4 1 -7 4 -10
               c 0 -1 -2 -5 0 -10
               c 0 0 3 -1 11 4
               c 3 -1 7 -2 10 -2
               c 3 0 7 1 10 2
               c 8 -5 11 -4 11 -4
               c 2 5 0 9 0 10
               c 2 3 4 6 4 10
               c 0 14 -8 17 -16 18
               c 1 1 2 4 2 7
               l 0 11
               c 0 1 1 2 3 2
               c 15 -5 26 -19 26 -36
               c 0 -21 -17 -38 -38 -38 z"
            fill="#ffffff"/>
    </g>

    <!-- Repo title -->
    <text x="190" y="80"
          font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
          font-size="22" font-weight="500" fill="#9ba9bb">github.com /</text>
    <text x="190" y="130"
          font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
          font-size="42" font-weight="700" fill="#f0f6fc">emails-manager</text>

    <!-- Topics / badges -->
    <g transform="translate(190, 158)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14">
      <g>
        <rect x="0" y="0" width="80" height="28" rx="14" fill="#1f2937" stroke="#30363d"/>
        <text x="40" y="19" text-anchor="middle" font-weight="500" fill="#79c0ff">django</text>
      </g>
      <g transform="translate(88, 0)">
        <rect x="0" y="0" width="64" height="28" rx="14" fill="#1f2937" stroke="#30363d"/>
        <text x="32" y="19" text-anchor="middle" font-weight="500" fill="#79c0ff">imap</text>
      </g>
      <g transform="translate(160, 0)">
        <rect x="0" y="0" width="100" height="28" rx="14" fill="#1f2937" stroke="#30363d"/>
        <text x="50" y="19" text-anchor="middle" font-weight="500" fill="#79c0ff">portfolio</text>
      </g>
      <g transform="translate(268, 0)">
        <rect x="0" y="0" width="84" height="28" rx="14" fill="#1f2937" stroke="#30363d"/>
        <text x="42" y="19" text-anchor="middle" font-weight="500" fill="#79c0ff">2fa-otp</text>
      </g>
    </g>

    <!-- Divider -->
    <line x1="50" y1="220" x2="910" y2="220" stroke="#30363d"/>

    <!-- Stats row -->
    <g transform="translate(50, 250)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
      <g>
        <circle cx="14" cy="20" r="14" fill="#1f2937"/>
        <path d="M 14 12 L 16 17 L 21 17 L 17 20 L 19 25 L 14 22 L 9 25 L 11 20 L 7 17 L 12 17 Z" fill="#f9c513"/>
        <text x="38" y="26" font-size="22" font-weight="700" fill="#f0f6fc">Star</text>
      </g>
      <g transform="translate(150, 0)">
        <text x="0" y="26" font-size="22" font-weight="500" fill="#9ba9bb">MIT licensed</text>
      </g>
      <g transform="translate(330, 0)">
        <circle cx="14" cy="20" r="6" fill="#3fb950"/>
        <text x="32" y="26" font-size="22" font-weight="500" fill="#9ba9bb">Tests passing</text>
      </g>
      <g transform="translate(540, 0)">
        <text x="0" y="26" font-size="22" font-weight="500" fill="#9ba9bb">Live on Railway</text>
      </g>
    </g>

    <!-- CTA bar -->
    <g transform="translate(50, 310)">
      <rect x="0" y="0" width="860" height="50" rx="12" fill="url(#g8-grad)"/>
      <text x="430" y="32" text-anchor="middle"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
            font-size="20" font-weight="700" fill="#ffffff">git clone · pip install -r requirements.txt · python manage.py runserver</text>
    </g>
  </g>

  <!-- Footer -->
  <g transform="translate(120, 1130)">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="url(#g8-grad)"/>
    <text x="20" y="30" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="24" font-weight="700" fill="#ffffff">@</text>
    <text x="52" y="28"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="18" font-weight="700" fill="#1a1d20">Mails Manager App · m-m.up.railway.app</text>
  </g>
</svg>
