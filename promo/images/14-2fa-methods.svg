<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" preserveAspectRatio="xMidYMid meet"
     role="img" aria-label="2FA methods compared">
  <title>Pick your 2FA — comparison</title>

  <defs>
    <linearGradient id="g14-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#005FF9"/>
      <stop offset="100%" stop-color="#0099FF"/>
    </linearGradient>
    <linearGradient id="g14-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbfcfd"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <pattern id="g14-dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#005FF9" fill-opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="1200" height="1200" fill="url(#g14-bg)"/>
  <rect width="1200" height="1200" fill="url(#g14-dots)"/>

  <!-- Eyebrow -->
  <g transform="translate(120, 100)">
    <rect x="0" y="0" width="170" height="44" rx="22" fill="#ffffff" stroke="#dee2e6"/>
    <circle cx="22" cy="22" r="6" fill="#198754"/>
    <text x="42" y="29"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="15" font-weight="600" fill="#1a1d20" letter-spacing="0.18em">2 F A &#160;· &#160;2 0 2 6</text>
  </g>

  <text x="120" y="220"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="76" font-weight="800" fill="#1a1d20" letter-spacing="-0.02em">Not all 2FA</text>
  <text x="120" y="302"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="76" font-weight="800" letter-spacing="-0.02em" fill="url(#g14-grad)">is created equal.</text>

  <!-- Comparison rows -->
  <g transform="translate(120, 380)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">

    <!-- header -->
    <g transform="translate(0, 0)">
      <text x="180" y="22" font-size="14" font-weight="700" fill="#6c757d" letter-spacing="0.18em">P H I S H</text>
      <text x="380" y="22" font-size="14" font-weight="700" fill="#6c757d" letter-spacing="0.18em">S I M &#160;S W A P</text>
      <text x="580" y="22" font-size="14" font-weight="700" fill="#6c757d" letter-spacing="0.18em">D E V I C E</text>
      <text x="780" y="22" font-size="14" font-weight="700" fill="#6c757d" letter-spacing="0.18em">F R I C T I O N</text>
    </g>

    <!-- Row: SMS -->
    <g transform="translate(0, 56)">
      <rect x="0" y="0" width="960" height="100" rx="18" fill="#ffffff" stroke="#dee2e6"/>
      <rect x="0" y="0" width="6" height="100" rx="3" fill="#dc3545"/>
      <text x="28" y="42" font-size="26" font-weight="700" fill="#1a1d20">SMS</text>
      <text x="28" y="72" font-size="15" font-weight="500" fill="#6c757d">Codes texted to your phone</text>
      <!-- markers -->
      <text x="180" y="62" font-size="32" font-weight="800" fill="#dc3545">✕</text>
      <text x="380" y="62" font-size="32" font-weight="800" fill="#dc3545">✕</text>
      <text x="580" y="62" font-size="32" font-weight="800" fill="#198754">✓</text>
      <text x="780" y="62" font-size="32" font-weight="800" fill="#198754">✓</text>
    </g>

    <!-- Row: TOTP -->
    <g transform="translate(0, 172)">
      <rect x="0" y="0" width="960" height="100" rx="18" fill="#ffffff" stroke="#dee2e6"/>
      <rect x="0" y="0" width="6" height="100" rx="3" fill="#fd7e14"/>
      <text x="28" y="42" font-size="26" font-weight="700" fill="#1a1d20">TOTP app</text>
      <text x="28" y="72" font-size="15" font-weight="500" fill="#6c757d">Authy, Google Auth, 1Password</text>
      <text x="180" y="62" font-size="32" font-weight="800" fill="#fd7e14">~</text>
      <text x="380" y="62" font-size="32" font-weight="800" fill="#198754">✓</text>
      <text x="580" y="62" font-size="32" font-weight="800" fill="#dc3545">✕</text>
      <text x="780" y="62" font-size="32" font-weight="800" fill="#fd7e14">~</text>
    </g>

    <!-- Row: Email-OTP (this app) -->
    <g transform="translate(0, 288)">
      <rect x="-6" y="-6" width="972" height="112" rx="22" fill="none" stroke="url(#g14-grad)" stroke-width="3"/>
      <rect x="0" y="0" width="960" height="100" rx="18" fill="#ffffff" stroke="#dee2e6"/>
      <rect x="0" y="0" width="6" height="100" rx="3" fill="url(#g14-grad)"/>
      <text x="28" y="42" font-size="26" font-weight="700" fill="#1a1d20">Email-OTP</text>
      <g transform="translate(170, 22)">
        <rect x="0" y="0" width="138" height="28" rx="14" fill="url(#g14-grad)"/>
        <text x="69" y="19" text-anchor="middle"
              font-size="13" font-weight="700" fill="#ffffff" letter-spacing="0.14em">T H I S &#160;A P P</text>
      </g>
      <text x="28" y="72" font-size="15" font-weight="500" fill="#6c757d">6-digit code via Resend · 5 min · single use</text>
      <text x="180" y="62" font-size="32" font-weight="800" fill="#198754">✓</text>
      <text x="380" y="62" font-size="32" font-weight="800" fill="#198754">✓</text>
      <text x="580" y="62" font-size="32" font-weight="800" fill="#198754">✓</text>
      <text x="780" y="62" font-size="32" font-weight="800" fill="#198754">✓</text>
    </g>

    <!-- Row: Passkeys -->
    <g transform="translate(0, 414)">
      <rect x="0" y="0" width="960" height="100" rx="18" fill="#ffffff" stroke="#dee2e6"/>
      <rect x="0" y="0" width="6" height="100" rx="3" fill="#6f42c1"/>
      <text x="28" y="42" font-size="26" font-weight="700" fill="#1a1d20">Passkeys / WebAuthn</text>
      <text x="28" y="72" font-size="15" font-weight="500" fill="#6c757d">Hardware-bound, the gold standard</text>
      <text x="180" y="62" font-size="32" font-weight="800" fill="#198754">✓</text>
      <text x="380" y="62" font-size="32" font-weight="800" fill="#198754">✓</text>
      <text x="580" y="62" font-size="32" font-weight="800" fill="#dc3545">✕</text>
      <text x="780" y="62" font-size="32" font-weight="800" fill="#fd7e14">~</text>
    </g>
  </g>

  <!-- Verdict bar -->
  <g transform="translate(120, 1000)">
    <rect x="0" y="0" width="960" height="100" rx="20" fill="url(#g14-grad)"/>
    <text x="40" y="42"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="24" font-weight="800" fill="#ffffff">Email-OTP = phish-resistant in practice, zero install, recoverable.</text>
    <text x="40" y="74"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="16" font-weight="500" fill="#ffffff" opacity="0.9">If you already trust your inbox, you already have 2FA.</text>
  </g>

  <!-- Footer -->
  <g transform="translate(120, 1140)">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="url(#g14-grad)"/>
    <text x="20" y="30" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="24" font-weight="700" fill="#ffffff">@</text>
    <text x="52" y="28"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="18" font-weight="700" fill="#1a1d20">Mails Manager App · m-m.up.railway.app</text>
  </g>
</svg>
