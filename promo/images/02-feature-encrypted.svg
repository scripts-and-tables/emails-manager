<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" preserveAspectRatio="xMidYMid meet"
     role="img" aria-label="Mails Manager App — encrypted credentials">
  <title>Mails Manager App — encrypted credentials</title>

  <defs>
    <linearGradient id="g2-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#005FF9"/>
      <stop offset="100%" stop-color="#0099FF"/>
    </linearGradient>
    <linearGradient id="g2-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbfcfd"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <pattern id="g2-dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#005FF9" fill-opacity="0.06"/>
    </pattern>
    <radialGradient id="g2-glow" cx="20%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#005FF9" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#005FF9" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="1200" fill="url(#g2-bg)"/>
  <rect width="1200" height="1200" fill="url(#g2-dots)"/>
  <rect width="1200" height="1200" fill="url(#g2-glow)"/>

  <!-- Eyebrow -->
  <g transform="translate(120, 140)">
    <rect x="0" y="0" width="220" height="44" rx="22" fill="#ffffff" stroke="#dee2e6"/>
    <circle cx="22" cy="22" r="6" fill="#005FF9"/>
    <text x="42" y="29"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="15" font-weight="600" fill="#1a1d20" letter-spacing="0.18em">F E A T U R E &#160;· &#160;0 1</text>
  </g>

  <!-- Headline -->
  <text x="120" y="260"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="84" font-weight="800" fill="#1a1d20" letter-spacing="-0.02em">Encrypted</text>
  <text x="120" y="360"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="84" font-weight="800" letter-spacing="-0.02em" fill="url(#g2-grad)">credentials.</text>

  <text x="120" y="430"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="28" font-weight="500" fill="#495057">IMAP passwords are Fernet-encrypted at rest.</text>
  <text x="120" y="468"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="28" font-weight="500" fill="#495057">The database never sees plaintext.</text>

  <!-- Lock icon card -->
  <g transform="translate(120, 540)">
    <rect x="0" y="0" width="960" height="500" rx="32" fill="#ffffff" stroke="#dee2e6" stroke-width="2"/>

    <!-- Big lock -->
    <g transform="translate(80, 110)">
      <rect x="0" y="80" width="220" height="200" rx="24" fill="url(#g2-grad)"/>
      <path d="M 40 80 L 40 50 a 70 70 0 0 1 140 0 L 180 80"
            fill="none" stroke="url(#g2-grad)" stroke-width="22" stroke-linecap="round"/>
      <circle cx="110" cy="170" r="16" fill="#ffffff"/>
      <rect x="104" y="170" width="12" height="50" rx="6" fill="#ffffff"/>
    </g>

    <!-- Plaintext vs Ciphertext panels -->
    <g transform="translate(380, 80)">
      <text x="0" y="0"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
            font-size="14" font-weight="600" fill="#6c757d" letter-spacing="0.18em">P L A I N T E X T</text>
      <rect x="0" y="16" width="500" height="64" rx="12" fill="#f1f3f5" stroke="#dee2e6"/>
      <text x="22" y="56"
            font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
            font-size="24" font-weight="600" fill="#1a1d20">hunter2-imap-pass</text>

      <text x="0" y="130"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
            font-size="14" font-weight="600" fill="#6c757d" letter-spacing="0.18em">F E R N E T &#160;· &#160;A T &#160;R E S T</text>
      <rect x="0" y="146" width="500" height="64" rx="12" fill="#0f1726"/>
      <text x="22" y="186"
            font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
            font-size="18" font-weight="600" fill="#7dd3fc">gAAAAABl9z...QcKx2pTH4_w==</text>

      <text x="0" y="260"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
            font-size="14" font-weight="600" fill="#6c757d" letter-spacing="0.18em">D B &#160;C O L U M N &#160;· &#160;` p a s s w o r d _ c i p h e r `</text>
      <rect x="0" y="276" width="500" height="64" rx="12" fill="#f1f3f5" stroke="#dee2e6"/>
      <text x="22" y="316"
            font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
            font-size="22" font-weight="600" fill="#1a1d20">BinaryField · key from KMS</text>
    </g>
  </g>

  <!-- Footer brand -->
  <g transform="translate(120, 1090)">
    <rect x="0" y="0" width="56" height="56" rx="12" fill="url(#g2-grad)"/>
    <text x="28" y="42" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="34" font-weight="700" fill="#ffffff">@</text>
    <text x="76" y="38"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="26" font-weight="700" fill="#1a1d20">Mails Manager App</text>
    <text x="76" y="62"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="18" font-weight="500" fill="#6c757d">m-m.up.railway.app</text>
  </g>
</svg>
