<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" preserveAspectRatio="xMidYMid meet"
     role="img" aria-label="Mails Manager App — built with Claude">
  <title>Mails Manager App — built with Claude</title>

  <defs>
    <linearGradient id="g13-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#005FF9"/>
      <stop offset="100%" stop-color="#0099FF"/>
    </linearGradient>
    <linearGradient id="g13-anth" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cc785c"/>
      <stop offset="100%" stop-color="#d97757"/>
    </linearGradient>
    <linearGradient id="g13-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbfcfd"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <pattern id="g13-dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#005FF9" fill-opacity="0.06"/>
    </pattern>
    <radialGradient id="g13-glow" cx="100%" cy="0%" r="65%">
      <stop offset="0%" stop-color="#cc785c" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#cc785c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="1200" fill="url(#g13-bg)"/>
  <rect width="1200" height="1200" fill="url(#g13-dots)"/>
  <rect width="1200" height="1200" fill="url(#g13-glow)"/>

  <!-- Eyebrow -->
  <g transform="translate(120, 140)">
    <rect x="0" y="0" width="220" height="44" rx="22" fill="#ffffff" stroke="#dee2e6"/>
    <circle cx="22" cy="22" r="6" fill="#cc785c"/>
    <text x="42" y="29"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="15" font-weight="600" fill="#1a1d20" letter-spacing="0.18em">B U I L T &#160;W I T H &#160;A I</text>
  </g>

  <text x="120" y="270"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="92" font-weight="800" fill="#1a1d20" letter-spacing="-0.02em">Shipped with</text>
  <text x="120" y="370"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="92" font-weight="800" letter-spacing="-0.02em" fill="url(#g13-anth)">Claude.</text>

  <text x="120" y="440"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="28" font-weight="500" fill="#495057">Pair-coded with Claude Code from scaffold to deploy.</text>
  <text x="120" y="478"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="28" font-weight="500" fill="#495057">Auth, IMAP, security review, 30 tests, Railway push.</text>

  <!-- Terminal-style transcript -->
  <g transform="translate(120, 550)">
    <rect x="0" y="0" width="960" height="430" rx="24" fill="#0d1117" stroke="#30363d" stroke-width="2"/>

    <!-- header -->
    <rect x="0" y="0" width="960" height="44" rx="24" fill="#161b22"/>
    <rect x="0" y="24" width="960" height="20" fill="#161b22"/>
    <circle cx="26" cy="22" r="7" fill="#f85149"/>
    <circle cx="50" cy="22" r="7" fill="#d29922"/>
    <circle cx="74" cy="22" r="7" fill="#3fb950"/>
    <text x="480" y="28" text-anchor="middle"
          font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
          font-size="14" font-weight="600" fill="#7d8590">claude — mails-manager</text>

    <!-- transcript -->
    <g transform="translate(36, 90)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17">
      <g>
        <circle cx="0" cy="-3" r="8" fill="url(#g13-anth)"/>
        <text x="20" y="2" font-weight="500" fill="#c9d1d9">› add email-OTP 2FA on every login, audit-logged</text>
      </g>
      <g transform="translate(0, 36)">
        <text x="20" y="2" font-weight="500" fill="#7d8590">  reading auth/views.py, models.py, settings.py…</text>
      </g>
      <g transform="translate(0, 72)">
        <text x="20" y="2" font-weight="500" fill="#3fb950">✓ wired django-otp · 6-digit code via Resend</text>
      </g>
      <g transform="translate(0, 108)">
        <text x="20" y="2" font-weight="500" fill="#3fb950">✓ AuthEvent model · login + otp + reset</text>
      </g>
      <g transform="translate(0, 144)">
        <text x="20" y="2" font-weight="500" fill="#3fb950">✓ tests · 8 cases pass (otp.tests.OTPLoginTests)</text>
      </g>
      <g transform="translate(0, 196)">
        <circle cx="0" cy="-3" r="8" fill="url(#g13-anth)"/>
        <text x="20" y="2" font-weight="500" fill="#c9d1d9">› review for OWASP top-10 before deploy</text>
      </g>
      <g transform="translate(0, 232)">
        <text x="20" y="2" font-weight="500" fill="#7d8590">  scanning HSTS · CSP · cookies · CSRF…</text>
      </g>
      <g transform="translate(0, 268)">
        <text x="20" y="2" font-weight="500" fill="#3fb950">✓ added CSP nonces · tightened cookies · all green</text>
      </g>
      <g transform="translate(0, 310)">
        <text x="20" y="2" font-weight="700" fill="#79c0ff">→ git push origin main · live in 50s</text>
      </g>
    </g>
  </g>

  <!-- Footer -->
  <g transform="translate(120, 1060)">
    <rect x="0" y="0" width="48" height="48" rx="10" fill="url(#g13-grad)"/>
    <text x="24" y="36" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="28" font-weight="700" fill="#ffffff">@</text>
    <text x="64" y="32"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="22" font-weight="700" fill="#1a1d20">Mails Manager App</text>
    <text x="64" y="56"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="16" font-weight="500" fill="#6c757d">paired with Claude · m-m.up.railway.app</text>
  </g>
</svg>
