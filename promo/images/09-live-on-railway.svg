<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" preserveAspectRatio="xMidYMid meet"
     role="img" aria-label="Mails Manager App — deployed on Railway">
  <title>Mails Manager App — deployed on Railway</title>

  <defs>
    <linearGradient id="g9-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#005FF9"/>
      <stop offset="100%" stop-color="#0099FF"/>
    </linearGradient>
    <linearGradient id="g9-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <pattern id="g9-dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#0099FF" fill-opacity="0.12"/>
    </pattern>
    <radialGradient id="g9-glow" cx="80%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#005FF9" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#005FF9" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="1200" fill="url(#g9-bg)"/>
  <rect width="1200" height="1200" fill="url(#g9-dots)"/>
  <rect width="1200" height="1200" fill="url(#g9-glow)"/>

  <!-- Eyebrow -->
  <g transform="translate(120, 140)">
    <rect x="0" y="0" width="190" height="44" rx="22" fill="#0d1117" stroke="#30363d"/>
    <circle cx="22" cy="22" r="6" fill="#3fb950"/>
    <circle cx="22" cy="22" r="11" fill="#3fb950" fill-opacity="0.25"/>
    <text x="42" y="29"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="15" font-weight="600" fill="#f0f6fc" letter-spacing="0.18em">D E P L O Y E D</text>
  </g>

  <text x="120" y="280"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="100" font-weight="800" fill="#f0f6fc" letter-spacing="-0.02em">git push</text>
  <text x="120" y="390"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="100" font-weight="800" letter-spacing="-0.02em" fill="url(#g9-grad)">→ production.</text>

  <text x="120" y="460"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="28" font-weight="500" fill="#9ba9bb">Deployed on Railway. No yak-shaving.</text>

  <!-- Build log card -->
  <g transform="translate(120, 550)">
    <rect x="0" y="0" width="960" height="430" rx="24" fill="#010409" stroke="#30363d" stroke-width="2"/>

    <!-- Window header -->
    <rect x="0" y="0" width="960" height="48" rx="24" fill="#0d1117"/>
    <rect x="0" y="28" width="960" height="20" fill="#0d1117"/>
    <circle cx="28" cy="24" r="7" fill="#f85149"/>
    <circle cx="52" cy="24" r="7" fill="#d29922"/>
    <circle cx="76" cy="24" r="7" fill="#3fb950"/>
    <text x="480" y="30" text-anchor="middle"
          font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
          font-size="14" font-weight="600" fill="#7d8590">Railway — Deployments</text>

    <!-- Log lines -->
    <g transform="translate(36, 96)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">
      <g>
        <text x="0" y="0" font-weight="500" fill="#7d8590">[12:04:18]</text>
        <text x="120" y="0" font-weight="600" fill="#79c0ff">⇪ git push origin main</text>
      </g>
      <g transform="translate(0, 36)">
        <text x="0" y="0" font-weight="500" fill="#7d8590">[12:04:22]</text>
        <text x="120" y="0" font-weight="500" fill="#c9d1d9">› detected python project</text>
      </g>
      <g transform="translate(0, 72)">
        <text x="0" y="0" font-weight="500" fill="#7d8590">[12:04:27]</text>
        <text x="120" y="0" font-weight="500" fill="#c9d1d9">› installing python 3.13 · pip install -r requirements.txt</text>
      </g>
      <g transform="translate(0, 108)">
        <text x="0" y="0" font-weight="500" fill="#7d8590">[12:04:51]</text>
        <text x="120" y="0" font-weight="500" fill="#c9d1d9">› python manage.py collectstatic --noinput</text>
      </g>
      <g transform="translate(0, 144)">
        <text x="0" y="0" font-weight="500" fill="#7d8590">[12:04:58]</text>
        <text x="120" y="0" font-weight="500" fill="#c9d1d9">› python manage.py migrate</text>
      </g>
      <g transform="translate(0, 180)">
        <text x="0" y="0" font-weight="500" fill="#7d8590">[12:05:03]</text>
        <text x="120" y="0" font-weight="500" fill="#c9d1d9">› starting gunicorn on $PORT</text>
      </g>
      <g transform="translate(0, 216)">
        <text x="0" y="0" font-weight="500" fill="#7d8590">[12:05:08]</text>
        <text x="120" y="0" font-weight="700" fill="#3fb950">✓ Live · m-m.up.railway.app</text>
      </g>
      <g transform="translate(0, 252)">
        <text x="0" y="0" font-weight="500" fill="#7d8590">[12:05:09]</text>
        <text x="120" y="0" font-weight="500" fill="#7d8590">build · 50s &#160;&#160; cold start · 5s</text>
      </g>
    </g>
  </g>

  <!-- Footer -->
  <g transform="translate(120, 1060)">
    <rect x="0" y="0" width="48" height="48" rx="10" fill="url(#g9-grad)"/>
    <text x="24" y="36" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="28" font-weight="700" fill="#ffffff">@</text>
    <text x="64" y="32"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="22" font-weight="700" fill="#f0f6fc">Mails Manager App</text>
    <text x="64" y="56"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="16" font-weight="500" fill="#9ba9bb">Try it: m-m.up.railway.app</text>
  </g>
</svg>
