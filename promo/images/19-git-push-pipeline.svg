<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" preserveAspectRatio="xMidYMid meet"
     role="img" aria-label="git push to live in 50 seconds — pipeline">
  <title>git push to live in 50 seconds — pipeline</title>

  <defs>
    <linearGradient id="g19-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#005FF9"/>
      <stop offset="100%" stop-color="#0099FF"/>
    </linearGradient>
    <linearGradient id="g19-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbfcfd"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <pattern id="g19-dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#005FF9" fill-opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="1200" height="1200" fill="url(#g19-bg)"/>
  <rect width="1200" height="1200" fill="url(#g19-dots)"/>

  <!-- Eyebrow -->
  <g transform="translate(120, 140)">
    <rect x="0" y="0" width="170" height="44" rx="22" fill="#ffffff" stroke="#dee2e6"/>
    <circle cx="22" cy="22" r="6" fill="#fd7e14"/>
    <text x="42" y="29"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="15" font-weight="600" fill="#1a1d20" letter-spacing="0.18em">P I P E L I N E</text>
  </g>

  <text x="120" y="270"
        font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="82" font-weight="800" fill="#1a1d20" letter-spacing="-0.02em">git push</text>
  <text x="120" y="368"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="82" font-weight="800" letter-spacing="-0.02em" fill="url(#g19-grad)">→ live in 50s.</text>

  <text x="120" y="436"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="26" font-weight="500" fill="#495057">From keystroke to production. Six steps. No yaml.</text>

  <!-- Pipeline: vertical timeline with 6 nodes -->
  <g transform="translate(160, 530)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">

    <!-- Vertical spine -->
    <line x1="40" y1="40" x2="40" y2="540" stroke="url(#g19-grad)" stroke-width="4" stroke-linecap="round"/>

    <!-- Step 1 -->
    <g>
      <circle cx="40" cy="40" r="22" fill="url(#g19-grad)"/>
      <text x="40" y="48" text-anchor="middle" font-size="20" font-weight="800" fill="#ffffff">1</text>
      <rect x="100" y="14" width="780" height="64" rx="14" fill="#ffffff" stroke="#dee2e6"/>
      <text x="124" y="42" font-size="22" font-weight="700" fill="#1a1d20">git commit · git push origin main</text>
      <text x="124" y="66" font-size="15" font-weight="500" fill="#6c757d">localhost → GitHub. Webhook fires.</text>
      <text x="820" y="50" text-anchor="end" font-size="20" font-weight="800" fill="url(#g19-grad)">+ 0s</text>
    </g>

    <!-- Step 2 -->
    <g transform="translate(0, 100)">
      <circle cx="40" cy="40" r="22" fill="url(#g19-grad)"/>
      <text x="40" y="48" text-anchor="middle" font-size="20" font-weight="800" fill="#ffffff">2</text>
      <rect x="100" y="14" width="780" height="64" rx="14" fill="#ffffff" stroke="#dee2e6"/>
      <text x="124" y="42" font-size="22" font-weight="700" fill="#1a1d20">Railway clones, detects Python 3.13</text>
      <text x="124" y="66" font-size="15" font-weight="500" fill="#6c757d">Nixpacks builder — no Dockerfile needed</text>
      <text x="820" y="50" text-anchor="end" font-size="20" font-weight="800" fill="url(#g19-grad)">+ 4s</text>
    </g>

    <!-- Step 3 -->
    <g transform="translate(0, 200)">
      <circle cx="40" cy="40" r="22" fill="url(#g19-grad)"/>
      <text x="40" y="48" text-anchor="middle" font-size="20" font-weight="800" fill="#ffffff">3</text>
      <rect x="100" y="14" width="780" height="64" rx="14" fill="#ffffff" stroke="#dee2e6"/>
      <text x="124" y="42" font-size="22" font-weight="700" fill="#1a1d20">pip install -r requirements.txt</text>
      <text x="124" y="66" font-size="15" font-weight="500" fill="#6c757d">Cached layer when nothing changed</text>
      <text x="820" y="50" text-anchor="end" font-size="20" font-weight="800" fill="url(#g19-grad)">+ 9s</text>
    </g>

    <!-- Step 4 -->
    <g transform="translate(0, 300)">
      <circle cx="40" cy="40" r="22" fill="url(#g19-grad)"/>
      <text x="40" y="48" text-anchor="middle" font-size="20" font-weight="800" fill="#ffffff">4</text>
      <rect x="100" y="14" width="780" height="64" rx="14" fill="#ffffff" stroke="#dee2e6"/>
      <text x="124" y="42" font-size="22" font-weight="700" fill="#1a1d20">collectstatic + migrate</text>
      <text x="124" y="66" font-size="15" font-weight="500" fill="#6c757d">Release-phase commands · Postgres updated</text>
      <text x="820" y="50" text-anchor="end" font-size="20" font-weight="800" fill="url(#g19-grad)">+ 38s</text>
    </g>

    <!-- Step 5 -->
    <g transform="translate(0, 400)">
      <circle cx="40" cy="40" r="22" fill="url(#g19-grad)"/>
      <text x="40" y="48" text-anchor="middle" font-size="20" font-weight="800" fill="#ffffff">5</text>
      <rect x="100" y="14" width="780" height="64" rx="14" fill="#ffffff" stroke="#dee2e6"/>
      <text x="124" y="42" font-size="22" font-weight="700" fill="#1a1d20">gunicorn boots, healthcheck passes</text>
      <text x="124" y="66" font-size="15" font-weight="500" fill="#6c757d">Old container drained, traffic flipped</text>
      <text x="820" y="50" text-anchor="end" font-size="20" font-weight="800" fill="url(#g19-grad)">+ 45s</text>
    </g>

    <!-- Step 6 -->
    <g transform="translate(0, 500)">
      <circle cx="40" cy="40" r="22" fill="#198754"/>
      <text x="40" y="48" text-anchor="middle" font-size="22" font-weight="800" fill="#ffffff">✓</text>
      <rect x="100" y="14" width="780" height="64" rx="14" fill="#d1e7dd" stroke="#a3cfbb"/>
      <text x="124" y="42" font-size="22" font-weight="800" fill="#0a3622">Live at m-m.up.railway.app</text>
      <text x="124" y="66" font-size="15" font-weight="500" fill="#0a3622">Slack ping. Sentry release tagged.</text>
      <text x="820" y="50" text-anchor="end" font-size="20" font-weight="800" fill="#198754">+ 50s</text>
    </g>
  </g>

  <!-- Footer -->
  <g transform="translate(120, 1130)">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="url(#g19-grad)"/>
    <text x="20" y="30" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="24" font-weight="700" fill="#ffffff">@</text>
    <text x="52" y="28"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="18" font-weight="700" fill="#1a1d20">Mails Manager App · m-m.up.railway.app</text>
  </g>
</svg>
