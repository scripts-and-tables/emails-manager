<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" preserveAspectRatio="xMidYMid meet"
     role="img" aria-label="Mails Manager App — email OTP two-factor authentication">
  <title>Mails Manager App — email OTP 2FA</title>

  <defs>
    <linearGradient id="g3-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#005FF9"/>
      <stop offset="100%" stop-color="#0099FF"/>
    </linearGradient>
    <linearGradient id="g3-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbfcfd"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <pattern id="g3-dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#005FF9" fill-opacity="0.06"/>
    </pattern>
    <radialGradient id="g3-glow" cx="100%" cy="0%" r="55%">
      <stop offset="0%" stop-color="#198754" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#198754" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="1200" fill="url(#g3-bg)"/>
  <rect width="1200" height="1200" fill="url(#g3-dots)"/>
  <rect width="1200" height="1200" fill="url(#g3-glow)"/>

  <!-- Eyebrow -->
  <g transform="translate(120, 140)">
    <rect x="0" y="0" width="220" height="44" rx="22" fill="#ffffff" stroke="#dee2e6"/>
    <circle cx="22" cy="22" r="6" fill="#198754"/>
    <text x="42" y="29"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="15" font-weight="600" fill="#1a1d20" letter-spacing="0.18em">F E A T U R E &#160;· &#160;0 2</text>
  </g>

  <!-- Headline -->
  <text x="120" y="260"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="80" font-weight="800" fill="#1a1d20" letter-spacing="-0.02em">Email-OTP 2FA,</text>
  <text x="120" y="360"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="80" font-weight="800" letter-spacing="-0.02em" fill="url(#g3-grad)">on by default.</text>

  <text x="120" y="430"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="28" font-weight="500" fill="#495057">Every sign-in needs a fresh 6-digit code.</text>
  <text x="120" y="468"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="28" font-weight="500" fill="#495057">No SMS. No authenticator app. Just your inbox.</text>

  <!-- OTP card -->
  <g transform="translate(180, 560)">
    <rect x="0" y="0" width="840" height="500" rx="32" fill="#ffffff" stroke="#dee2e6" stroke-width="2"/>

    <!-- Card header: from -->
    <g transform="translate(40, 40)">
      <circle cx="22" cy="22" r="22" fill="url(#g3-grad)"/>
      <text x="22" y="30" text-anchor="middle"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
            font-size="20" font-weight="700" fill="#ffffff">@</text>
      <text x="60" y="20"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
            font-size="18" font-weight="700" fill="#1a1d20">Mails Manager App</text>
      <text x="60" y="42"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
            font-size="14" font-weight="500" fill="#6c757d">noreply@mails-manager.app</text>
    </g>

    <text x="40" y="150"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="22" font-weight="500" fill="#495057">Your sign-in code:</text>

    <!-- 6 digit boxes -->
    <g transform="translate(40, 190)">
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="110" height="140" rx="18" fill="#f1f3f5" stroke="#dee2e6"/>
        <text x="55" y="100" text-anchor="middle"
              font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
              font-size="68" font-weight="800" fill="#1a1d20">4</text>
      </g>
      <g transform="translate(126, 0)">
        <rect x="0" y="0" width="110" height="140" rx="18" fill="#f1f3f5" stroke="#dee2e6"/>
        <text x="55" y="100" text-anchor="middle"
              font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
              font-size="68" font-weight="800" fill="#1a1d20">7</text>
      </g>
      <g transform="translate(252, 0)">
        <rect x="0" y="0" width="110" height="140" rx="18" fill="#f1f3f5" stroke="#dee2e6"/>
        <text x="55" y="100" text-anchor="middle"
              font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
              font-size="68" font-weight="800" fill="#1a1d20">2</text>
      </g>
      <g transform="translate(414, 0)">
        <rect x="-12" y="-12" width="134" height="164" rx="22" fill="none" stroke="url(#g3-grad)" stroke-width="3"/>
        <rect x="0" y="0" width="110" height="140" rx="18" fill="#ffffff" stroke="#dee2e6"/>
        <text x="55" y="100" text-anchor="middle"
              font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
              font-size="68" font-weight="800" letter-spacing="-0.02em" fill="url(#g3-grad)">9</text>
      </g>
      <g transform="translate(540, 0)">
        <rect x="0" y="0" width="110" height="140" rx="18" fill="#f1f3f5" stroke="#dee2e6"/>
        <text x="55" y="100" text-anchor="middle"
              font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
              font-size="68" font-weight="800" fill="#1a1d20">0</text>
      </g>
      <g transform="translate(666, 0)">
        <rect x="0" y="0" width="110" height="140" rx="18" fill="#f1f3f5" stroke="#dee2e6"/>
        <text x="55" y="100" text-anchor="middle"
              font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
              font-size="68" font-weight="800" fill="#1a1d20">3</text>
      </g>
    </g>

    <!-- Expiry note -->
    <g transform="translate(40, 380)">
      <circle cx="10" cy="10" r="10" fill="#fff3cd" stroke="#ffe69c"/>
      <text x="28" y="16"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
            font-size="18" font-weight="500" fill="#6c757d">Expires in 5 minutes. Single use.</text>
    </g>
    <g transform="translate(40, 420)">
      <circle cx="10" cy="10" r="10" fill="#d1e7dd" stroke="#a3cfbb"/>
      <text x="28" y="16"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
            font-size="18" font-weight="500" fill="#6c757d">Audit-logged to AuthEvent on every attempt.</text>
    </g>
  </g>

  <!-- Footer brand -->
  <g transform="translate(120, 1110)">
    <rect x="0" y="0" width="48" height="48" rx="10" fill="url(#g3-grad)"/>
    <text x="24" y="36" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="28" font-weight="700" fill="#ffffff">@</text>
    <text x="64" y="34"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="22" font-weight="700" fill="#1a1d20">Mails Manager App</text>
  </g>
</svg>
