[tool.ruff]
line-length = 120
target-version = "py313"
extend-exclude = ["core/migrations", ".venv"]

[tool.ruff.lint]
select = [
  "E",   # pycodestyle errors
  "W",   # pycodestyle warnings
  "F",   # pyflakes
  "I",   # isort
  "B",   # flake8-bugbear
  "UP",  # pyupgrade
]
ignore = [
  "E501",  # line length is enforced via the formatter, not the linter
  "B008",  # function call in default arg (Django uses this idiomatically)
]

[tool.ruff.lint.per-file-ignores]
"core/migrations/*" = ["E", "W", "F", "I"]
"core/tests/*" = ["E501"]
